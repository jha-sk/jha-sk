name: Refresh profile assets

# Re-renders the Tokyo Night stats card from the GitHub API and commits it back.
# Self-hosted on purpose: the public github-readme-stats instance is frequently
# paused, which would leave the profile showing broken images.

on:
  schedule:
    - cron: "17 4 * * *"        # daily, 04:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "assets/**.py"
      - ".github/workflows/profile-assets.yml"

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render static assets
        working-directory: assets
        run: python generate.py

      - name: Render stats card
        working-directory: assets
        env:
          # A classic PAT with read:user gives richer numbers (private
          # contributions, followers). Falls back to the ephemeral job token.
          GITHUB_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || secrets.GITHUB_TOKEN }}
          PROFILE_USER: ${{ github.repository_owner }}
        run: python stats.py

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain assets)" ]; then
            echo "assets unchanged"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git commit -m "chore: refresh profile assets"
          git push
